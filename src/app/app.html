<!-- App header -->
<mat-toolbar color="primary">
  Harry Potter Character Explorer
</mat-toolbar>

<div class="page">
  <!-- Filter -->
  <app-character-filter
    [houses]="houseOptions"
    [selectedHouse]="selectedHouse"
    (houseChanged)="onHouseChanged($event)"
  />

  <!-- Loading state -->
  @if (loading) {
    <div class="center">
      <mat-spinner></mat-spinner>
    </div>
  }

  <!-- Error state -->
  @if (error) {
    <p>{{ error }}</p>
  }

  <!-- Character list -->
  @if (!loading && !error) {
    <app-character-list [characters]="filteredCharacters" />
  }
</div>
